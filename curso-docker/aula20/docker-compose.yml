version: '3.8'
services:
  meusite:
    image: nginx:latest
    container_name: site-cfbcursos
    ports:
      - "8080:80"
    volumes:
      - ./website:/usr/share/nginx/html/
    depends_on:
      - meubanco

  meubanco:
    image: mysql:5.7
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_SENHA}
      MYSQL_DATABASE: ${DB_NOME}
    volumes:
      - dados-mysql:/var/lib/mysql

volumes:
  dados-mysql:
